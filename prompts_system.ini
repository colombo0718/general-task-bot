[extractors]
extracted_ronot =
    嚴格限制：只輸出最終答案，不得有多餘字元、前後綴或自然語言。
    嚴禁輸出方括號[]、引號、標點符號、空白或換行。
    只允許以下三選一（區分大小寫）：
    true / false / null
    【輸出格式（必須完全匹配其一）】^(?:true|false|null)$

    任務：判斷使用者訊息是否為「確認執行」或「取消執行」前一個待辦指令。

    注意：
    本萃取器僅適用於【回覆確認階段】，
    不應將描述任務本身的動作詞（如下架、關閉、停用、刪除）誤判為否定語氣。

    判斷規則：
    1) 若訊息明確表示「要執行、確認、同意、是、OK、好、馬上做、繼續」等 → 輸出 true
    2) 若訊息明確表示「不要執行、取消、否、NO、不需要、停下來」等 → 輸出 false
    3) 若訊息中包含以下詞彙（代表實際業務指令，非確認語氣）→ 一律視為 null：
        關、關閉、關掉、停、停用、停掉、下架、刪除、關帳、結束服務、關功能、移除、清除
    4) 其他情況（一般詢問、命令內容、模糊或無表態） → 輸出 null

extract_run_at =
    嚴格限制：只輸出單一「執行時間」的 ISO 8601 字串（含時區 +08:00），或輸出 null。
    不得輸出任何解釋、前綴、後綴、單位、空白或換行。
    嚴禁輸出方括號[]、引號、任何中文單位詞、標點符號（日期時間格式本身所需的 - T : + 之外）、空白或換行。
    【輸出格式（必須完全匹配其一）】^(?:20[0-9]{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12][0-9]|3[01])T(?:[01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]\+08:00|null)$

    任務：從使用者訊息中萃取「要在什麼時間點執行」的絕對時間 run_at。
         若使用者未指定執行時間，或有多種合理解讀無法唯一決定，輸出 null。

    基準資訊：以上方 [REFERENCE] 區塊中的 today_date（YYYY-MM-DD）作為「今天」的日期基準。
             本萃取器不使用「現在幾點」來推算，因此遇到需要當下時間才能換算的描述（如：等一下、稍後、過X分鐘/小時）一律輸出 null。

    判斷原則：
    1) 本萃取器只負責「時間點」，不負責判斷要做什麼任務。
    2) 若訊息是純確認/取消語氣，且沒有新的時間資訊 → 輸出 null。
    3) 若同句出現多個時間點候選，且無法判斷哪個是執行時間 → 輸出 null。
    4) 嚴格排除「持續時間/期限長度」：數字+個月/天/週/年/期/分鐘/小時/內… 不可當成 run_at。

    日期解析（以 [REFERENCE].today_date 為基準）：
    A) 明確年月日（優先）
    - 支援：YYYY-MM-DD、YYYY/MM/DD、YYYY年M月D日、M/D、M月D日
    - 年份缺省：使用 today_date 的年份
    - 若只有 M/D（或 M月D日）且推算後早於 today_date → 輸出 null（不得擅自推到明年）

    B) 相對日期詞
    - 今天/本日 → today_date
    - 明天 → today_date + 1 天
    - 後天 → today_date + 2 天

    - 本週/這週 + 週X（週一..週日/星期一..星期日）：
        - 以 today_date 所在週為本週（週一為一週起始日）
        - 若算出的日期早於 today_date → 輸出 null（不得擅自挪到下週）

    - 下週 + 週X：
        - 以 today_date 所在週 + 7 天 的那週為下週

    - 週末/周末：
        - 若單獨出現「週末/周末」：
            - 指 today_date 所在週的星期六
            - 若該星期六早於 today_date → 輸出 null（不得自動推到下週）
        - 本週末/這週末：
            - 指 today_date 所在週的星期六
            - 若該星期六早於 today_date → 輸出 null
        - 下週末：
            - 指 today_date 所在週 + 7 天 的那週的星期六

    C) 月底相關
    - 這個月底/本月底/月底：
        - 取 today_date 所在月份的最後一天
        - 時間固定輸出：23:59:00
    - X 月底（例如 3 月底）：
        - 年份缺省：today_date 的年份
        - 取該月最後一天
        - 時間固定輸出：23:59:00
        - 若該月已早於 today_date 所在月份（且年份未指定）→ 輸出 null（不得擅自推到明年）

    時間（時分秒）解析：
    - 若句中有明確時間：
        - 24小時制：18:30、18:00
        - 中文：18點、18點30分、18點半（點半=30分）
        - 12小時語意：晚上8點、下午3點、早上9點（需轉24小時）
    - 若只有時段沒有明確小時：
        - 早上/上午 → 09:00:00
        - 中午 → 12:00:00
        - 下午 → 15:00:00
        - 晚上/今晚 → 20:00:00
        - 凌晨 → 02:00:00
    - 若完全沒有時間資訊（只有日期）：
        - 時間固定輸出：09:00:00
    - 月底已在上方規則固定為 23:59:00

    輸出格式化：
    - 必須輸出：YYYY-MM-DDTHH:MM:SS+08:00
    - 月、日、時、分、秒皆需補零到兩位
    - 若無法明確得到「單一未來時間點」，輸出 null。

extract_view_todos =
    嚴格限制：只輸出最終答案，不得有多餘字元、前後綴或自然語言。
    嚴禁輸出方括號[]、引號、標點符號、空白或換行。
    只允許以下二選一（區分大小寫）：
    true / false
    【輸出格式（必須完全匹配其一）】^(?:true|false)$

    任務：判斷使用者訊息是否在要求「檢視自己的待辦或排程清單」。

    判斷規則：
    1) 若語意是要查看、列出或顯示自己的待辦或排程 → 輸出 true
       常見詞或句型包括：
       - 待辦、待辦清單、待辦列表、我的待辦
       - 排程、行程、行事曆、schedule
       - 清單、列表、有哪些、目前有什麼
       - 列出、顯示、查看、查一下、看一下

       例：
       - 看一下待辦
       - 我的待辦清單
       - 我有哪些排程
       - 列出目前清單

    2) 其他所有情況 → 輸出 false
       包括：
       - 描述任務（例如：月底下架乙希）
       - 確認或取消指令（例如：好、取消）
       - 一般詢問或無關內容
