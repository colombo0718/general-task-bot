[extractors]

; ── 第一層：判斷使用者意圖類型 ──────────────────────────────────────────
identify_cs_intent =
    嚴格限制：只輸出最終答案，不得輸出任何解釋、前綴或後綴。
    嚴禁輸出方括號[]、引號、標點符號、空白或換行。
    只允許以下三選一（區分大小寫）：
    queryKB / escalateSupport / null
    【輸出格式（必須完全匹配其一）】^(?:queryKB|escalateSupport|null)$

    任務：判斷使用者輸入屬於「查詢系統操作或功能說明」還是「申請人工客服協助」。
    規則：
    1) 若訊息包含功能詢問、操作說明、錯誤訊息排查等意圖，例如：
       「怎麼」「如何」「為什麼」「無法」「被擋」「看不到」「灰色」「找不到」
       「設定」「開啟」「步驟」「哪裡可以」「出現錯誤」「要怎麼辦」→ queryKB
    2) 若訊息包含要求轉接真人或申請遠端協助的意圖，例如：
       「真人」「客服」「遠端」「聯絡」「電話」「TeamViewer」「AnyDesk」「請幫我聯繫」→ escalateSupport
    3) 其他或無法判斷 → null


; ── 第二層：從知識庫目錄直接選出對應節次 ────────────────────────────────
get_cs_sections =
    嚴格限制：只輸出節次編號，不得輸出任何解釋、前綴或後綴。
    只允許：單一節次（如 1-3）或兩個節次以逗號分隔（如 1-3,7-2），或 null。
    最多輸出兩個節次，不得超過。
    【輸出格式（必須完全匹配其一）】^(?:\d{1,2}-\d{1,2}(?:,\d{1,2}-\d{1,2})?|null)$

    任務：對照以下知識庫目錄，判斷使用者的問題最對應哪一節或哪兩節，輸出節次編號。

    知識庫目錄：
    1-1 系統安裝與下載 - 官網、安裝檔、授權帳號、重灌、管理員執行
    1-2 系統更新與版本 - 說明.exe、版本過舊、捷徑、授權到期
    1-3 系統登入 - 公司帳號、員工帳號、登入失敗、密碼、鎖定
    1-4 連線與啟動問題 - 轉圈圈、網路、防毒、Defender、無效物件
    2-1 商品建檔基礎 - 新增商品、公版、條碼、過時、刪除
    2-2 商品分類與屬性 - 手機、SIM卡、不盤點、特案、日盤月盤
    2-3 商品成本與定價 - 售價、底價、固定成本、加權平均、自訂成本
    2-4 大量資料處理 - Excel匯入匯出、批次修改、大量過時
    3-1 銷售單作業 - 開單、付款、刷卡、分期、會員、發票
    3-2 銷售單特殊情況 - 查詢不到、IMEI修正、庫存不足、跨店
    3-3 銷貨退回 - 退貨、退款、七日、庫存回補
    3-4 日結帳作業 - 結帳、日報、收款核對、結帳後查詢
    4-1 電信專案與報價 - 報價、新申辦、續約、電信補貼
    4-2 預約單作業 - 預約、訂金、到貨通知、取貨、代辦
    4-3 SIM卡管理 - SIM卡、卡號、防呆、重複進貨、SIM卡紀錄查詢
    5-1 維修單作業 - 維修、收件、轉送、報價、取貨、退款、備用機
    5-2 新品不良RMA - 不良品、換新機、RMA、廠商送修
    6-1 進貨單作業 - 進貨、廠商、含稅、條碼、IMEI補輸
    6-2 進貨退出 - 退廠商、進貨退出
    6-3 出貨單與批卡 - 批發、出貨、批卡、簽核
    6-4 出貨退回批卡退回 - 批發退貨、出貨退回
    6-5 分店調貨 - 調貨、調撥、到貨確認、庫存變化
    7-1 即時庫存查詢 - 即時庫存、重新整理、條碼搜尋
    7-2 庫存異常排查 - 負庫存、數量不對、商品編號不一致
    7-3 盤點作業 - 盤點、LINE盤點、條碼機盤點
    7-4 盤盈入庫盤虧出庫 - 盤盈、盤虧、庫存調整、序號校正
    8-1 IMEI序號管理 - IMEI、序號、防呆、展示機、修正
    8-2 IMEI報表查詢 - IMEI報表、進貨查詢、分店位置、維修紀錄
    9-1 銷售類報表 - 銷退明細、銷售排行、員工業績
    9-2 庫存類報表 - 庫存查詢表、進銷異動、半年限制、月報
    9-3 業績與目標報表 - 業績戰報、目標達成、毛利目標、葵花寶典
    9-4 維修與繳費報表 - 維修報表、工單查詢、繳費報表
    10-1 毛利統計 - 毛利、毛利延遲、二手機毛利、重算
    10-2 廠商對帳與發票 - 廠商明細、發票號碼、進項發票、營業稅
    10-3 成本調整 - 自訂成本、加權平均、庫存為零成本
    11-1 員工資料輸入 - 新增員工、分店、帳號、離職
    11-2 員工權限設定 - 權限、群組、被擋、遠端協助
    12-1 雜項工具設定 - 雜項設定、擋庫存、必填IMEI、顯示售價
    12-2 分店與電信業者設定 - 分店、電信業者、銀行分期、鎖定
    12-3 行動裝置設定 - UID、LINE POS綁定、換手機
    13-1 二手機管理 - 二手機、收購、庫存、毛利
    13-2 電信退佣作業 - 退佣、上線申請、門號、佣金、核銷
    13-3 快速訂貨系統 - 訂貨、門市下訂、訂貨部門
    13-4 繳費雜收雜支 - 繳費、雜收、雜支、代收
    14-1 LINE行動POS - LINE POS、開通、換機、瀏覽器
    14-2 標籤機設定 - 標籤機、a.fmt、字體、驅動
    14-3 條碼機設定 - 條碼機、輸入法、連續掃描、藍芽

    規則：
    - 對照目錄中每節的關鍵字，選出最符合使用者問題的節次
    - 若問題同時橫跨兩個節次（例如：進貨後庫存沒更新），可輸出兩個節次以逗號分隔
    - 超過兩個節次時只取最相關的兩個
    - 若完全無法對應任何節次 → null

    範例：
    - 「登入一直轉圈圈」→ 1-4
    - 「庫存數量變成負的」→ 7-2
    - 「進貨後即時庫存沒更新」→ 6-1,7-1
    - 「員工帳號被擋住無法登入」→ 1-3,11-2
    - 「商品條碼掃不到」→ 14-3


; ── 申請人工客服：摘要使用者問題 ──────────────────────────────────────
get_issue_brief =
    嚴格限制：只輸出最終答案，不得輸出任何解釋、前綴或後綴。
    只允許：中文、英文或數字描述，最多 30 個字元，或 null
    【輸出格式（必須完全匹配其一）】^(?:[\u4e00-\u9fffA-Za-z0-9\s]{1,30}|null)$

    任務：從申請人工客服的訊息中，擷取問題摘要（功能名稱 + 狀況描述）。
    規則：
    - 保留核心問題描述，去除客套語（「謝謝」「麻煩了」「請幫我」）
    - 若有明確功能名稱，保留在摘要中
    - 若沒有具體問題說明，僅申請聯絡 → null

    範例：
    - 「我需要真人客服，系統一直出現錯誤無法開立銷售單」→ 無法開立銷售單
    - 「請聯絡客服，申請遠端協助」→ 申請遠端協助
    - 「我要找真人」→ null
